<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order With Us</title>
    <link rel="stylesheet" href="order.css">
</head>
<body>

    <div class="container">

        <h1>Order With Us</h1>

        <p class="caption">
            Freshly Brewed Happiness Delivered To Your Doorstep ☕
        </p>

        <form class="order-form">

            <div class="input-group">
                <label>Customer Name</label>
                <input type="text" placeholder="Enter your name" required>
            </div>

            <div class="input-group">
                <label>Phone Number</label>
                <input type="tel" placeholder="Enter phone number" required>
            </div>

            <div class="input-group">
                <label>Address</label>
                <textarea placeholder="Enter delivery address" required></textarea>
            </div>

            <div class="input-group">
                <label>Select Item</label>
                <select required>
                    <option value="">Choose an item</option>
                    <option>Espresso</option>
                    <option>Cappuccino</option>
                    <option>Latte</option>
                    <option>Americano</option>
                    <option>Mocha</option>
                    <option>Cold Coffee</option>
                    <option>Hot Chocolate</option>
                    <option>Veg Sandwich</option>
                    <option>Cheese Burger</option>
                    <option>Chocolate Brownie</option>
                </select>
            </div>

            <div class="input-group">
                <label>Item Quantity</label>
                <input type="number" min="1" placeholder="Enter quantity" required>
            </div>

            <button type="submit">Place Order</button>

        </form>
<footer>
            © 2026 Tree House Café | Made With ☕ & ❤️
        </footer>

    </div>

</body>
</html>
