<svg width="320" height="90" viewBox="0 0 320 90" xmlns="http://www.w3.org/2000/svg">

  <!-- Icon Circle -->
  <circle cx="45" cy="45" r="30" fill="#2e7d32"></circle>

  <!-- Coffee cup -->
  <rect x="35" y="38" width="20" height="18" rx="3" fill="#d7a86e"></rect>
  
  <!-- Cup handle -->
  <path d="M55 42 C65 42,65 52,55 52" stroke="#d7a86e" stroke-width="3" fill="none"></path>

  <!-- Steam forming "M" -->
