  <circle cx="35" cy="30" r="6" fill="#43a047"></circle>
  <circle cx="55" cy="30" r="6" fill="#43a047"></circle>

  <!-- Brand Name -->
  <text x="90" y="45" font-size="22" font-family="Arial" font-weight="bold" fill="#3e2f1c">
    Tree House Cafe
  </text>

  <!-- Tagline -->
  <text x="90" y="68" font-size="14" font-family="Arial" fill="#2e7d32">
    Fresh Coffee • Cozy Vibes
